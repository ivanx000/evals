name: Eval Suite

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  SUITE: examples/summarization.yaml   # ← change to your suite file

jobs:
  eval:
    name: Run eval suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate suite (dry run)
        run: node dist/cli.js run "$SUITE" --dry-run

      - name: Run eval suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node dist/cli.js run "$SUITE" --output results/ci-run.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: results/
